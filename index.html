<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂單預估系統</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2e3350;
    --text: #e8eaf6; --text2: #9aa0c4; --text3: #5a6080;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Noto Sans TC', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

  .title { font-size: 13px; font-weight: 700; color: var(--text3); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 12px; }
  h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 48px; }

  .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px 36px; width: 260px; cursor: pointer; text-decoration: none; color: inherit; transition: all .2s; display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
  .card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }

  .card-logo { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; color: #fff; }
  .logo-w { background: linear-gradient(135deg,#2563eb,#7c3aed); }
  .logo-k { background: linear-gradient(135deg,#e53e3e,#c53030); }

  .card-brand { font-size: 12px; font-weight: 700; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; }
  .card-name  { font-size: 18px; font-weight: 700; }
  .card-desc  { font-size: 12px; color: var(--text2); line-height: 1.6; }

  .card-tags  { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(59,130,246,.12); color: #93c5fd; }
  .tag-red { background: rgba(239,68,68,.12); color: #fca5a5; }

  .card-arrow { margin-top: 8px; font-size: 18px; color: var(--text3); align-self: flex-end; transition: transform .2s; }
  .card:hover .card-arrow { transform: translateX(4px); color: var(--text2); }

  .footer { margin-top: 48px; font-size: 12px; color: var(--text3); }
</style>
</head>
<body>

<div class="title">庫存管理平台</div>
<h1>訂單預估系統</h1>
<p class="subtitle">庫存管理 · 銷售預測 · 採購建議</p>

<div class="cards">

  <a class="card" href="./wakamoto.html">
    <div class="card-logo logo-w">若</div>
    <div class="card-brand">Wakamoto</div>
    <div class="card-name">若元系列</div>
    <div class="card-desc">胃腸錠 · 益生菌<br>6個 SKU</div>
    <div class="card-tags">
      <span class="tag">330T</span>
      <span class="tag">960T</span>
      <span class="tag">1000T</span>
      <span class="tag">350T</span>
      <span class="tag">200T</span>
      <span class="tag">220T</span>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <a class="card" href="./kaigen.html">
    <div class="card-logo logo-k">改</div>
    <div class="card-brand">Kaigen</div>
    <div class="card-name">改源系列</div>
    <div class="card-desc">IB止痛 · 感冒系列<br>5個 SKU</div>
    <div class="card-tags">
      <span class="tag-red tag">IB 8包</span>
      <span class="tag-red tag">IB 16包</span>
      <span class="tag-red tag">IB 24入</span>
      <span class="tag-red tag">感冒顆粒</span>
      <span class="tag-red tag">感冒錠</span>
    </div>
    <div class="card-arrow">→</div>
  </a>

</div>

<div class="footer">© 2026 · 訂單預估系統</div>

</body>
</html>
